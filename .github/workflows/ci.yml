name: namanpuja-ci

on:
  push:
    paths:
      - "namanpuja/**"
  pull_request:
    paths:
      - "namanpuja/**"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: namanpuja/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest -q
        env:
          USE_MOCK_LLM: "true"
          ENFORCE_AUTH: "false"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: namanpuja/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
