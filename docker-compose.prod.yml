services:
  mongo:
    image: mongo:7
    volumes:
      - namanpuja_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - namanpuja_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers --forwarded-allow-ips='*'
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      ENFORCE_AUTH: "true"
      MONGODB_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready')",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: python worker.py
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      MONGODB_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  namanpuja_mongo_data:
  namanpuja_redis_data:
