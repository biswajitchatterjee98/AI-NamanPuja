services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - namanpuja_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: development
      MONGODB_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      ENFORCE_AUTH: "false"
      LOCAL_IMAGE_DIR: /app/images
    volumes:
      - ./backend/app:/app/app
      - ./backend/worker.py:/app/worker.py
      - ./backend/monitor.py:/app/monitor.py
      - ./frontend/public/images:/app/images
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready')",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  worker:
    build:
      context: ./backend
    command: python worker.py
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: development
      MONGODB_URI: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      LOCAL_IMAGE_DIR: /app/images
    volumes:
      - ./backend/app:/app/app
      - ./backend/worker.py:/app/worker.py
      - ./backend/monitor.py:/app/monitor.py
      - ./frontend/public/images:/app/images
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_DEV_API_PROXY: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  namanpuja_mongo_data:
